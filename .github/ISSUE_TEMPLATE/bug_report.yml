name: Bug report
description: Report a bug in the RHCL ecosystem
title: "[BUG] "
labels: ["area/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. See [rhcl-ai](https://github.com/Everything-is-Code/rhcl-ai) for program context. Write in English.

  - type: dropdown
    id: repo
    attributes:
      label: Affected repo
      options:
        - 3scaleextract
        - gateforge
        - rhcl-ai
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what you expected
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Go/Java version, 3scale tenant, etc.

name: Feature request
description: Proponer una funcionalidad
title: "[FEAT] "
labels: ["area/feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema / necesidad
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Milestone sugerido
      options:
        - M1 — Test foundation
        - M2 — Integration offline
        - M3 — E2E lab
        - Backlog

  - type: checkboxes
    id: repos
    attributes:
      label: Repos impactados
      options:
        - label: 3scaleextract
        - label: gateforge
        - label: rhcl-ai

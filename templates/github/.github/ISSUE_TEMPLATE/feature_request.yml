name: Feature request
description: Propose a feature
title: "[FEAT] "
labels: ["area/feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / need
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Suggested milestone
      options:
        - M1 - Test foundation
        - M2 - Integration offline
        - M3 - E2E lab
        - Backlog

  - type: checkboxes
    id: repos
    attributes:
      label: Impacted repos
      options:
        - label: 3scaleextract
        - label: gateforge
        - label: rhcl-ai

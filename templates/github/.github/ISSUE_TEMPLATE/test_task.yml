name: Test task
description: Test or CI task
title: "[TEST] "
labels: ["area/tests"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Test scope
      description: Package/class/component to cover
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Unit tests pass in CI
        - [ ] Minimum coverage documented
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: PO priority
      options:
        - priority/p0
        - priority/p1
        - priority/p2
        - priority/p3
    validations:
      required: true

  - type: input
    id: issue_ref
    attributes:
      label: Plan reference (e.g. GF-1, EXT-1)
      placeholder: GF-1
